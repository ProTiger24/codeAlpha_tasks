<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot — CodeAlpha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            width: 700px;
            height: 85vh;
            background: #0f3460;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            background: #e94560;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .chat-header span {
            font-size: 14px;
            opacity: 0.85;
            display: block;
            margin-top: 4px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 10px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
            }
        }

        .user-msg {
            background: #e94560;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-msg {
            background: #1a1a2e;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing {
            background: #1a1a2e;
            color: #aaa;
            align-self: flex-start;
            padding: 12px 20px;
            border-radius: 18px;
            font-style: italic;
        }

        .input-area {
            display: flex;
            padding: 16px;
            gap: 10px;
            background: #0a2540;
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 30px;
            background: #1a1a2e;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .input-area input::placeholder {
            color: #888;
        }

        .input-area button {
            padding: 14px 24px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #c73652;
        }

        .input-area button:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">
            🤖 AI Chatbot
            <span>Powered by Abdul Alim — CodeAlpha Internship</span>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot-msg">
                👋 Hi, I am your personal chatbot. Feel free to ask questions.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Write your message..." />
            <button id="sendBtn" onclick="sendMessage()">Send ➤</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');


        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-msg');
            userInput.value = '';
            sendBtn.disabled = true;


            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerText = 'Typing...';
            chatBox.appendChild(typing);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                chatBox.removeChild(typing);
                appendMessage(data.reply, 'bot-msg');

            } catch (err) {
                chatBox.removeChild(typing);
                appendMessage('❌ Error: not responding', 'bot-msg');
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>

</body>

</html>
